server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compresión
    gzip on;
    gzip_types text/css application/javascript image/svg+xml;
    gzip_min_length 1024;

    # Con trailingSlash:true cada ruta es una carpeta con index.html
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Cache largo para assets estáticos (imágenes, videos, fuentes, JS/CSS con hash)
    location ~* \.(jpg|jpeg|png|gif|webp|svg|mp4|woff2?|js|css|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Healthcheck simple para Coolify/Traefik
    location = /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
